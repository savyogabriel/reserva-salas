<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Dashboard')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="container my-4 flex-grow-1">

    <div class="d-flex align-items-center mb-4">
        <div class="hero-icon me-3">
            <i class="bi bi-speedometer2 fs-1 text-primary"></i>
        </div>
        <div>
            <h1 class="h2 mb-0 fw-bold">Dashboard</h1>
            <p class="text-muted mb-0">Visão geral do sistema de reservas</p>
        </div>
    </div>

    <!-- Cards de estatísticas -->
    <div class="row g-4 mb-4">

        <!-- Total de Salas -->
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100 card-stat">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="stat-icon bg-primary-subtle rounded-circle p-3">
                        <i class="bi bi-building fs-3 text-primary"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold" th:text="${totalSalas}">0</div>
                        <div class="text-muted small">Total de Salas</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Salas Ativas -->
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100 card-stat">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="stat-icon bg-success-subtle rounded-circle p-3">
                        <i class="bi bi-door-open fs-3 text-success"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-success" th:text="${salasAtivas}">0</div>
                        <div class="text-muted small">Salas Ativas</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reservas Pendentes -->
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100 card-stat">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="stat-icon bg-warning-subtle rounded-circle p-3">
                        <i class="bi bi-hourglass-split fs-3 text-warning"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-warning" th:text="${reservasPendentes}">0</div>
                        <div class="text-muted small">Aguardando Aprovação</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reservas Aprovadas -->
        <div class="col-sm-6 col-xl-3">
            <div class="card border-0 shadow-sm h-100 card-stat">
                <div class="card-body d-flex align-items-center gap-3 p-4">
                    <div class="stat-icon bg-info-subtle rounded-circle p-3">
                        <i class="bi bi-calendar-check fs-3 text-info"></i>
                    </div>
                    <div>
                        <div class="fs-2 fw-bold text-info" th:text="${reservasAprovadas}">0</div>
                        <div class="text-muted small">Reservas Aprovadas</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ações rápidas -->
    <div class="row g-3">
        <div class="col-12">
            <h5 class="fw-semibold text-muted mb-3">
                <i class="bi bi-lightning me-2"></i>Ações Rápidas
            </h5>
        </div>

        <div class="col-md-4">
            <a th:href="@{/reservas/solicitar}"
               class="btn btn-primary w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-plus-lg fs-5"></i>
                <span class="fw-semibold">Solicitar Reserva</span>
            </a>
        </div>

        <div class="col-md-4">
            <a th:href="@{/reservas}" class="btn btn-outline-primary w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-list-check fs-5"></i>
                <span class="fw-semibold">Ver Minhas Reservas</span>
            </a>
        </div>

        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/reservas/aprovacao}"
               class="btn btn-warning w-100 py-3 d-flex align-items-center justify-content-center gap-2">
                <i class="bi bi-clipboard2-check fs-5"></i>
                <span class="fw-semibold">
                    Aprovar Reservas
                    <span th:if="${reservasPendentes > 0}"
                          class="badge bg-danger ms-1" th:text="${reservasPendentes}"></span>
                </span>
            </a>
        </div>
    </div>

</main>

<footer th:replace="~{layout/base :: footer}"></footer>
<script th:replace="~{layout/base :: scripts}"></script>
</body>
</html>
