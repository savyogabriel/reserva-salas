<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/base :: head('Reservas')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">

<nav th:replace="~{layout/base :: navbar}"></nav>
<div th:replace="~{layout/base :: alerts}"></div>

<main class="container my-4 flex-grow-1">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 fw-bold mb-0"><i class="bi bi-calendar-check me-2 text-primary"></i>Reservas</h1>
            <p class="text-muted mb-0"
               th:text="${isAdmin} ? 'Todas as reservas do sistema' : 'Suas reservas'"></p>
        </div>
        <a th:href="@{/reservas/solicitar}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Solicitar Reserva
        </a>
    </div>

    <!-- Filtro por Status (apenas admin) -->
    <div th:if="${isAdmin}" class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/reservas}" method="get" class="d-flex gap-2 align-items-center">
                <label class="form-label mb-0 fw-semibold text-nowrap">Filtrar por status:</label>
                <select name="status" class="form-select form-select-sm" style="max-width:200px">
                    <option value="">Todos</option>
                    <option th:each="s : ${statusValues}"
                            th:value="${s}"
                            th:text="${s}"
                            th:selected="${s == statusFiltro}"></option>
                </select>
                <button type="submit" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-funnel me-1"></i>Filtrar
                </button>
                <a th:href="@{/reservas}" class="btn btn-sm btn-outline-secondary">Limpar</a>
            </form>
        </div>
    </div>

    <!-- Tabela de Reservas -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">Sala</th>
                            <th th:if="${isAdmin}" scope="col">Usuário</th>
                            <th scope="col">Data</th>
                            <th scope="col">Horário</th>
                            <th scope="col" class="text-center">Status</th>
                            <th scope="col" class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${reservas.empty}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>
                                Nenhuma reserva encontrada.
                            </td>
                        </tr>
                        <tr th:each="reserva : ${reservas}">
                            <td class="text-muted small" th:text="${reserva.id}"></td>
                            <td class="fw-semibold" th:text="${reserva.sala.nome}"></td>
                            <td th:if="${isAdmin}" th:text="${reserva.nomeUsuario}"></td>
                            <td th:text="${#temporals.format(reserva.data, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span th:text="${#temporals.format(reserva.horaInicio, 'HH:mm')}"></span>
                                —
                                <span th:text="${#temporals.format(reserva.horaFim, 'HH:mm')}"></span>
                            </td>
                            <td class="text-center">
                                <span th:switch="${reserva.status.name()}">
                                    <span th:case="'PENDENTE'"  class="badge bg-warning text-dark">
                                        <i class="bi bi-hourglass-split me-1"></i>Pendente
                                    </span>
                                    <span th:case="'APROVADA'"  class="badge bg-success">
                                        <i class="bi bi-check-circle me-1"></i>Aprovada
                                    </span>
                                    <span th:case="'REJEITADA'" class="badge bg-danger">
                                        <i class="bi bi-x-circle me-1"></i>Rejeitada
                                    </span>
                                    <span th:case="'CANCELADA'" class="badge bg-secondary">
                                        <i class="bi bi-slash-circle me-1"></i>Cancelada
                                    </span>
                                </span>
                            </td>
                            <td class="text-center">
                                <form th:if="${reserva.status.name() == 'PENDENTE' or reserva.status.name() == 'APROVADA'}"
                                      th:action="@{/reservas/{id}/cancelar(id=${reserva.id})}"
                                      method="post"
                                      onsubmit="return confirm('Cancelar esta reserva?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-x-lg me-1"></i>Cancelar
                                    </button>
                                </form>
                                <span th:if="${reserva.status.name() != 'PENDENTE' and reserva.status.name() != 'APROVADA'}"
                                      class="text-muted small">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout/base :: footer}"></footer>
<script th:replace="~{layout/base :: scripts}"></script>
</body>
</html>
