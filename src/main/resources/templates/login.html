<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Reserva de Salas</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-5 col-lg-4">

            <!-- Logo / Título -->
            <div class="text-center mb-4">
                <div class="login-logo mb-3">
                    <i class="bi bi-building-fill-check display-3 text-primary"></i>
                </div>
                <h1 class="h3 fw-bold">Reserva de Salas</h1>
                <p class="text-muted small">Sistema de Gerenciamento de Salas de Estudo</p>
            </div>

            <div class="card border-0 shadow">
                <div class="card-body p-4">

                    <!-- Erro de autenticação -->
                    <div th:if="${param.error}"
                         class="alert alert-danger py-2 mb-3">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Usuário ou senha inválidos.
                    </div>

                    <!-- Logout -->
                    <div th:if="${param.logout}"
                         class="alert alert-success py-2 mb-3">
                        <i class="bi bi-check-circle me-2"></i>
                        Você saiu com sucesso.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                <i class="bi bi-person me-1"></i>Usuário
                            </label>
                            <input type="text"
                                   id="username"
                                   name="username"
                                   class="form-control"
                                   placeholder="Digite seu usuário"
                                   autofocus required/>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                <i class="bi bi-lock me-1"></i>Senha
                            </label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Digite sua senha"
                                   required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                        </button>
                    </form>
                </div>
            </div>

            <!-- Credenciais de acesso para o avaliador -->
            <div class="card border-0 mt-3 bg-secondary-subtle">
                <div class="card-body p-3">
                    <p class="mb-2 small fw-bold text-secondary">
                        <i class="bi bi-info-circle me-1"></i>Credenciais de acesso:
                    </p>
                    <div class="row g-2 small">
                        <div class="col-12">
                            <code class="text-danger">admin</code> / <code>admin123</code>
                            <span class="badge bg-danger ms-1">ADMIN</span>
                        </div>
                        <div class="col-12">
                            <code>joao</code> / <code>user123</code> —
                            <code>maria</code> / <code>user123</code> —
                            <code>pedro</code> / <code>user123</code>
                            <span class="badge bg-secondary ms-1">USER</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
