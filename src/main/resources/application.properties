# ============================================================
#  Sistema de Reserva de Salas de Estudo — application.properties
# ============================================================

spring.application.name=reserva-salas

# ── DataSource (PostgreSQL) ─────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/reserva_salas_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────
# validate: garante que o schema do banco bate com as entidades
# Use 'create' apenas na primeira execução ou desenvolvimento
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Thymeleaf ───────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Mensagens de erro / validação ───────────────────────────
spring.mvc.format.date=yyyy-MM-dd
